# Single service: API + built frontend (same for local and production).
# Environment variables from .env when present (copy from .env.example).
#
# Server usage: use restart policy so the app starts after a reboot.
#   docker compose up -d
#   (or enable a systemd unit that runs: docker compose -f /path/to/compose.yml up -d)
services:
  api:
    build:
      context: ./flashcards/app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      DATA_DIR: ${DATA_DIR:-/data}
      SQLITE_PATH: ${SQLITE_PATH:-/data/flashcards.sqlite}
      AUDIO_CACHE_DIR: ${AUDIO_CACHE_DIR:-/data/audio_cache}
      SERVE_WEB: "true"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - flashcards_data:/data
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  flashcards_data:
